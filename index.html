<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── IndexedDB persistence ────────────────────────────────────────────────────
const DB_NAME = ‘STRAnalyzer’, DB_VERSION = 1, STORE = ‘analyses’;
function openDB() {
return new Promise((res, rej) => {
const req = indexedDB.open(DB_NAME, DB_VERSION);
req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: ‘id’ });
req.onsuccess = e => res(e.target.result);
req.onerror = e => rej(e.target.error);
});
}
async function dbGet(id) {
const db = await openDB();
return new Promise((res, rej) => {
const tx = db.transaction(STORE, ‘readonly’);
const req = tx.objectStore(STORE).get(id);
req.onsuccess = () => res(req.result);
req.onerror = () => rej(req.error);
});
}
async function dbGetAll() {
const db = await openDB();
return new Promise((res, rej) => {
const tx = db.transaction(STORE, ‘readonly’);
const req = tx.objectStore(STORE).getAll();
req.onsuccess = () => res(req.result.sort((a,b) => b.savedAt - a.savedAt));
req.onerror = () => rej(req.error);
});
}
async function dbPut(obj) {
const db = await openDB();
return new Promise((res, rej) => {
const tx = db.transaction(STORE, ‘readwrite’);
tx.objectStore(STORE).put(obj);
tx.oncomplete = () => res();
tx.onerror = () => rej(tx.error);
});
}
async function dbDelete(id) {
const db = await openDB();
return new Promise((res, rej) => {
const tx = db.transaction(STORE, ‘readwrite’);
tx.objectStore(STORE).delete(id);
tx.oncomplete = () => res();
tx.onerror = () => rej(tx.error);
});
}

// ─── Financial Engine ─────────────────────────────────────────────────────────
function calcMortgage(principal, annualRate, years) {
if (annualRate === 0) return principal / (years * 12);
const r = annualRate / 100 / 12, n = years * 12;
return principal * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
}

function buildAnalysis(prop, inputs) {
const price = prop.price;
const dp = inputs.loanType === ‘cash’ ? price : price * (inputs.downPct / 100);
const loanAmt = price - dp;
const monthly = inputs.loanType === ‘cash’ ? 0 : calcMortgage(loanAmt, inputs.interestRate, inputs.loanTermYears);
const annual = monthly * 12;

// STR Revenue
const grossRevenue = prop.strGrossRevenue; // monthly
const platforms = [‘Airbnb’, ‘VRBO’, ‘Direct’];
const platFeeRate = 0.03; // platform listing fee avg ~3%
const airbnbFee = grossRevenue * 0.6 * 0.03; // Airbnb guest fee portion (host ~3%)
const vrboFee = grossRevenue * 0.3 * 0.05;
const directFee = 0; // direct booking no fee
const platformFees = airbnbFee + vrboFee + directFee;
const occupancyRevenue = grossRevenue;

// Expenses monthly

// ─── Claude API call ──────────────────────────────────────────────────────────
async function fetchPropertyData(address, setStep) {
setStep(‘🔍 Parsing address…’);
await new Promise(r => setTimeout(r, 400));

setStep(‘🏠 Fetching property data…’);
const prompt = `You are a real estate data API. Given the address "${address}", return a JSON object (no markdown, no explanation, only valid JSON) with these exact keys: { "address": "full formatted address", "city": "city name", "state": "state abbreviation", "zip": "zip code", "price": estimated listing price as integer, "beds": number of bedrooms, "baths": number of bathrooms (as decimal like 2.5), "sqft": estimated square footage as integer, "yearBuilt": estimated year built as integer, "propertyType": "Single Family" or "Condo" or "Townhouse" or "Multi-Family", "propertyTax": estimated annual property tax as integer, "hoa": estimated monthly HOA as integer (0 if none), "insurance": estimated annual homeowner's insurance as integer, "strGrossRevenue": estimated monthly STR gross revenue as integer (based on location and size), "occupancyRate": estimated STR occupancy rate as integer (50-85), "avgNightlyRate": estimated average nightly rate as integer, "strMarket": "string describing the STR market demand (e.g., Beach town, high demand)", "marketNotes": "1-2 sentence market note about STR potential" } Use realistic values for the given address. For STR revenue, base it on similar properties on Airbnb/VRBO in that area.`;

const resp = await fetch(“https://api.anthropic.com/v1/messages”, {
method: “POST”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify({
model: “claude-sonnet-4-20250514”,
max_tokens: 1000,
messages: [{ role: “user”, content: prompt }]
})
});

if (!resp.ok) throw new Error(‘API error: ’ + resp.status);
const data = await resp.json();
const text = data.content.map(b => b.text || ‘’).join(’’).replace(/`json|`/g, ‘’).trim();
const json = JSON.parse(text);

setStep(‘✅ Property loaded!’);
return json;
}

// ─── Saved Tab ────────────────────────────────────────────────────────────────
function SavedTab({ onLoad }) {
const [list, setList] = useState([]);
const [loading, setLoading] = useState(true);

useEffect(() => {
dbGetAll().then(items => { setList(items); setLoading(false); }).catch(() => setLoading(false));
}, []);

const handleDelete = async (id, e) => {
e.stopPropagation();
await dbDelete(id);
setList(l => l.filter(i => i.id !== id));
};

if (loading) return <div className="loading-wrap"><div className="spinner" /><div className="loading-text">Loading saved analyses…</div></div>;
if (!list.length) return (
<div className="empty-state">
<div className="empty-icon">💾</div>
<div className="empty-title">No Saved Analyses</div>
<div className="empty-sub">Analyze a property and it will automatically be saved here. All data is stored locally on your device.</div>
</div>
);

return (
<div>
<div className=“info-row” style={{ marginBottom: 12 }}>
<span>📱</span>
<div className="info-row-text">{list.length} propert{list.length===1?‘y’:‘ies’} saved locally on your device.</div>
</div>
{list.map(a => (
<div key={a.id} className=“saved-item” onClick={() => onLoad(a)}>
<div className="saved-item-header">
<div className="saved-item-address">{a.prop?.address}</div>
<div style={{ display:‘flex’, gap:6, alignItems:‘center’ }}>
<div className="saved-item-date">{new Date(a.savedAt).toLocaleDateString()}</div>
<button onClick={e => handleDelete(a.id,e)} style={{ background:‘none’, border:‘none’, color:‘var(–text3)’, cursor:‘pointer’, fontSize:16, padding:2 }}>🗑</button>
</div>
</div>
<div className="saved-item-price">{fmtD(a.prop?.price)}</div>
<div className="saved-item-metrics">
<div className={`saved-chip ${a.cashFlow>=0?'green':'red'}`}>CF: {fmtSign(a.cashFlow)}/mo</div>
<div className="saved-chip gold">CoC: {fmtPct(a.cashOnCash)}</div>
<div className="saved-chip gold">Tax: {fmtD(a.taxSavings)}/yr</div>
<div className="saved-chip">5yr: {fmtPct(a.totalROI5)}</div>
</div>
</div>
))}
</div>
);
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
const [activeTab, setActiveTab] = useState(‘search’);
const [analysis, setAnalysis] = useState(null);

const handleAnalyze = (a) => {
setAnalysis(a);
setActiveTab(‘results’);
};

const handleLoad = (a) => {
setAnalysis(a);
setActiveTab(‘results’);
};

const tabs = [
{ id: ‘search’, icon: ‘🔍’, label: ‘Search’ },
{ id: ‘results’, icon: ‘📊’, label: ‘Results’ },
{ id: ‘saved’, icon: ‘💾’, label: ‘Saved’ },
];

return (
<div className="app">
<header className="app-header">
<div className="header-inner">
<div className="logo">
<div className="logo-icon">🏡</div>
<div>
<div className="logo-text">STR Analyzer</div>
<div className="logo-sub">Short-Term Rental Engine</div>
</div>
</div>
{analysis && (
<button className=“icon-btn” title=“New search” onClick={() => setActiveTab(‘search’)}>＋</button>
)}
</div>
</header>

```
  <main className="main">
    {activeTab === 'search' && <SearchTab onAnalyze={handleAnalyze} />}
    {activeTab === 'results' && <ResultsTab analysis={analysis} />}
    {activeTab === 'saved' && <SavedTab onLoad={handleLoad} />}
  </main>

  <nav className="bottom-nav">
    {tabs.map(t => (
      <div key={t.id} className={`nav-item ${activeTab===t.id?'active':''}`} onClick={() => setActiveTab(t.id)}>
        <span className="nav-icon">{t.icon}</span>
        <span className="nav-label">{t.label}</span>
      </div>
    ))}
  </nav>
</div>
```

);
}

ReactDOM.render(<App />, document.getElementById(‘root’));
</script>
